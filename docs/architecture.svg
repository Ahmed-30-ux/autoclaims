<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 750" width="1000" height="750">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
    <linearGradient id="fe" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="api" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="qwen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="hr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000020"/>
    </filter>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1000" height="750" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#1e293b">AutoClaims — Architecture Diagram</text>
  <text x="500" y="58" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">AI-Powered Insurance Claims Processing with Qwen Cloud</text>

  <!-- =========== LAYER 1: Frontend =========== -->
  <rect x="320" y="80" width="360" height="95" rx="10" fill="url(#fe)" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="105" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#1d4ed8">Frontend (Next.js + React Flow)</text>

  <rect x="340" y="118" width="90" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="385" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">Dashboard</text>

  <rect x="440" y="118" width="90" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="485" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">New Claim</text>

  <rect x="540" y="118" width="120" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="600" y="136" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#1e40af">Pipeline Viz</text>

  <!-- Header label -->
  <rect x="40" y="75" width="80" height="22" rx="4" fill="#3b82f6"/>
  <text x="80" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">USER</text>

  <!-- =========== Arrow: FE -> API =========== -->
  <line x1="500" y1="175" x2="500" y2="220" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- =========== LAYER 2: API Gateway =========== -->
  <rect x="320" y="225" width="360" height="60" rx="10" fill="url(#api)" stroke="#22c55e" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="250" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#166534">API Gateway (FastAPI)</text>
  <text x="500" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#15803d">REST Endpoints — Claims CRUD, Processing, Reviews</text>

  <!-- Layer label -->
  <rect x="40" y="240" width="60" height="22" rx="4" fill="#22c55e"/>
  <text x="70" y="255" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">API</text>

  <!-- =========== Arrow: API -> Orchestrator =========== -->
  <line x1="500" y1="285" x2="500" y2="330" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- =========== LAYER 3: Agent Orchestrator =========== -->
  <rect x="60" y="335" width="880" height="120" rx="10" fill="url(#agent)" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#92400e">Agent Orchestrator — 5-Agent Pipeline</text>

  <!-- Agent boxes -->
  <rect x="80" y="375" width="120" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="140" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Intake</text>
  <text x="140" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Vision + Extraction</text>

  <line x1="200" y1="402" x2="220" y2="402" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="225" y="375" width="120" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="285" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Validation</text>
  <text x="285" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Policy Verification</text>

  <line x1="345" y1="402" x2="365" y2="402" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="370" y="375" width="120" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="430" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Assessment</text>
  <text x="430" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Damage + Payout</text>

  <line x1="490" y1="402" x2="510" y2="402" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="515" y="375" width="120" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="575" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Review Gate</text>
  <text x="575" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Auto vs Human</text>

  <line x1="635" y1="402" x2="655" y2="402" stroke="#d97706" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="660" y="375" width="120" height="55" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="720" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#92400e">Resolution</text>
  <text x="720" y="418" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#b45309">Final Decision</text>

  <!-- Layer label -->
  <rect x="40" y="385" width="60" height="22" rx="4" fill="#d97706"/>
  <text x="70" y="400" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">AI</text>

  <!-- =========== Human Review Arrow =========== -->
  <path d="M 635 430 L 830 160" stroke="#ea580c" stroke-width="2" stroke-dasharray="6,4" fill="none" marker-end="url(#arrow-orange)"/>
  <rect x="670" y="300" width="110" height="20" rx="4" fill="#fff7ed" stroke="#ea580c" stroke-width="1"/>
  <text x="725" y="314" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">Flags for review</text>

  <!-- =========== Layzer 4: Qwen Cloud =========== -->
  <line x1="500" y1="455" x2="500" y2="495" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <rect x="250" y="500" width="500" height="100" rx="10" fill="url(#qwen)" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="500" y="525" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#6b21a8">Qwen Cloud API (Alibaba Cloud Model Studio)</text>

  <rect x="270" y="540" width="130" height="40" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="335" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8">qwen3.7-max</text>
  <text x="335" y="574" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed">Validation / Assessment</text>

  <rect x="420" y="540" width="130" height="40" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="485" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8">qwen3.7-plus</text>
  <text x="485" y="574" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed">Intake (Vision)</text>

  <rect x="570" y="540" width="130" height="40" rx="8" fill="#f3e8ff" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="635" y="560" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="#6b21a8">qwen3.6-flash</text>
  <text x="635" y="574" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#7c3aed">Resolution (Fast)</text>

  <!-- Layer label -->
  <rect x="40" y="535" width="60" height="22" rx="4" fill="#8b5cf6"/>
  <text x="70" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">AI</text>

  <!-- =========== Database =========== -->
  <line x1="880" y1="395" x2="880" y2="335" stroke="#db2777" stroke-width="2"/>

  <rect x="790" y="500" width="180" height="100" rx="10" fill="url(#db)" stroke="#db2777" stroke-width="2" filter="url(#shadow)"/>
  <text x="880" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#9d174d">Data Layer</text>
  <rect x="805" y="533" width="70" height="24" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="840" y="549" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">Claims</text>
  <rect x="885" y="533" width="70" height="24" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="920" y="549" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">Policies</text>
  <rect x="805" y="565" width="70" height="24" rx="5" fill="#fce7f3" stroke="#db2777" stroke-width="1"/>
  <text x="840" y="581" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#9d174d">Reviews</text>

  <!-- Layer label -->
  <rect x="40" y="535" width="60" height="22" rx="4" fill="#db2777"/>
  <text x="70" y="550" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" font-weight="bold" fill="white">DB</text>

  <!-- =========== Human Review Box =========== -->
  <rect x="780" y="115" width="180" height="80" rx="10" fill="url(#hr)" stroke="#ea580c" stroke-width="2" stroke-dasharray="5,3" filter="url(#shadow)"/>
  <text x="870" y="145" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#c2410c">Human Review</text>
  <text x="870" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">Dashboard</text>
  <text x="870" y="182" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#ea580c">Approve / Reject</text>

  <!-- =========== Legend =========== -->
  <rect x="250" y="630" width="500" height="40" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1"/>
  <text x="500" y="655" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">
    Legend:  Blue = Data Flow  |  Purple = AI Inference  |  Orange = Human Review Path
  </text>

  <!-- Footer -->
  <text x="500" y="715" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#94a3b8">AutoClaims — Global AI Hackathon with Qwen Cloud (Track 4: Autopilot Agent)</text>
</svg>